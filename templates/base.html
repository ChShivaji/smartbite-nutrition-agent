<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBite - AI Nutrition Agent</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="brand-section">
                <div class="brand-logo"><i class="fas fa-heartbeat"></i></div>
                <div class="brand-name">SmartBite</div>
                <button class="mobile-nav-toggle" id="mobileNavToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            
            <nav class="sidebar-nav" id="sidebarNav">
                <a href="{{ url_for('index') }}" class="nav-item {% if request.path == '/' %}active{% endif %}">
                    <i class="fas fa-columns"></i> Dashboard
                </a>
                <a href="{{ url_for('chat') }}" class="nav-item {% if request.path == '/chat' %}active{% endif %}">
                    <i class="fas fa-robot"></i> AI Coach
                </a>
                <a href="{{ url_for('swaps') }}" class="nav-item {% if request.path == '/swaps' %}active{% endif %}">
                    <i class="fas fa-exchange-alt"></i> Smart Swaps
                </a>
                <a href="{{ url_for('family') }}" class="nav-item {% if request.path == '/family' %}active{% endif %}">
                    <i class="fas fa-users"></i> Family Profiles
                </a>
                <a href="{{ url_for('settings') }}" class="nav-item {% if request.path == '/settings' %}active{% endif %}">
                    <i class="fas fa-cog"></i> Settings
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div class="d-flex align-items-center gap-2">
                    {% if config_data.use_simulation %}
                    <span class="badge bg-warning text-dark"><i class="fas fa-server"></i> Simulation Mode</span>
                    {% else %}
                    <span class="badge bg-success"><i class="fas fa-cloud"></i> Granite Live</span>
                    {% endif %}
                </div>
                <div class="text-muted mt-2" style="font-size: 0.75rem;">AICTE University Engagement 2026</div>
            </div>
        </aside>

        <!-- Main Workspace Area -->
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JavaScript -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
